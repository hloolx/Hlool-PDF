<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">hlool pdf README banner</title>
  <desc id="desc">A wide repository banner showing the hlool pdf workspace, PDF pages, stamp marks, seam seal slices, and Alan sheep mascot.</desc>
